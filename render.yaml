services:
  - type: web
    name: walkietalk-go
    env: docker
    plan: free
    autoDeploy: true
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: 3000
      - key: ENV
        value: production
      - key: CORS_ORIGINS
        sync: false
      - key: PUBLIC_API_KEY
        sync: false
      - key: ZONE_WRITE_REQUIRES_API_KEY
        value: "false"
      - key: MAX_ZONE_READ_RATE
        value: "60"
      - key: MAX_ZONE_WRITE_RATE
        value: "20"
      - key: CHANNEL_EMPTY_TTL_SECS
        value: "900"
      - key: MAPBOX_ACCESS_TOKEN
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: REDIS_URL
        sync: false
      - key: REDIS_ENABLED
        value: "true"
