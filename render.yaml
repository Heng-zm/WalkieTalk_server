services:
  - type: web
    name: walkietalk-go
    env: docker
    plan: free
    autoDeploy: true
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: 3000
      - key: ENV
        value: production
      - key: CORS_ORIGINS
        sync: false
      - key: PUBLIC_API_KEY
        sync: false
      - key: AI_API_KEY
        sync: false
      - key: AI_ASSISTANT_API_KEY
        sync: false
      - key: AI_ASSISTANT_URL
        value: https://bot-voice-sqnz.onrender.com/ai-assistant
      - key: AI_CHAT_URL
        sync: false
      - key: MAPBOX_ACCESS_TOKEN
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: REDIS_URL
        sync: false
      - key: REDIS_ENABLED
        value: "true"
